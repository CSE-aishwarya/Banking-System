<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">
    <title>SecureBank - Login</title>
    <style>
        * { margin:0; padding:0;
            box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(
                135deg, #1a237e, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px
                rgba(0,0,0,0.3);
        }
        .bank-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .bank-logo h1 {
            color: #1a237e;
            font-size: 28px;
        }
        .bank-logo p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #1a237e;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(
                135deg, #1a237e, #1565c0);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { opacity: 0.9; }
        .error-msg {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .success-msg {
            color: green;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            line-height: 2;
        }
        .links a {
            color: #1a237e;
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-link {
            color: #c62828 !important;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
                border-radius: 12px;
            }
            .bank-logo h1 { font-size: 24px; }
            input { font-size: 14px; }
            .btn-login { font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="bank-logo">
        <h1>🏦 SecureBank</h1>
        <p>Your Trusted Banking Partner</p>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email"
               placeholder="Enter your email">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password"
               placeholder="Enter your password">
    </div>

    <button class="btn-login" onclick="login()">
        Login to Account
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="links">
        Don't have an account?
        <a href="register.html">Register Now</a>
        <br>
        <a href="forgot-password.html"
           class="forgot-link">
            🔐 Forgot Password?
        </a>
    </div>
</div>

<script>
async function login() {
    const email =
        document.getElementById('email').value;
    const password =
        document.getElementById('password').value;
    const errorMsg =
        document.getElementById('errorMsg');
    const successMsg =
        document.getElementById('successMsg');

    errorMsg.textContent = '';
    successMsg.textContent = '';

    if (!email || !password) {
        errorMsg.textContent =
            'Please fill all fields!';
        return;
    }

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.clear();
            localStorage.setItem('token', data.token);
            localStorage.setItem('email', data.email);
            localStorage.setItem(
                'fullName', data.fullName);
            localStorage.setItem('role', data.role);
            successMsg.textContent =
                'Login successful!';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        } else {
            const errText = await res.text();
            errorMsg.textContent =
                errText || 'Invalid credentials!';
        }
    } catch (err) {
        errorMsg.textContent =
            'Server error. Try again!';
    }
}

// Login on Enter key
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
